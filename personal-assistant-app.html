<body>
  <!-- Header -->
  <header>
    <h1>📝 个人助手</h1>
    <div class="stats">已保存 <span id="total-items">0</span> 个灵感</div>
  </header>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">快速记录</div>
        <div class="record-buttons">
          <button class="record-btn" onclick="showRecordPanel('text')">
            <span class="icon">📝</span> 文字记录
          </button>
          <button class="record-btn" onclick="showRecordPanel('audio')">
            <span class="icon">🎵</span> 音频录制
          </button>
          <button class="record-btn" onclick="showRecordPanel('image')">
            <span class="icon">📷</span> 图片捕捉
          </button>
          <button class="record-btn" onclick="showRecordPanel('link')">
            <span class="icon">🔗</span> 链接收藏
          </button>
          <button class="record-btn" onclick="showRecordPanel('drawing')">
            <span class="icon">🎨</span> 随手涂鸦
          </button>
        </div>
      </div>

      <div class="sidebar-section filter-section">
        <div class="sidebar-title">搜索筛选</div>
        <input type="text" class="search-input" placeholder="搜索灵感..." id="search-input" onkeyup="filterItems()">
        <div class="filter-tags">
          <button class="filter-tag active" onclick="filterByType('all')">全部</button>
          <button class="filter-tag" onclick="filterByType('text')">文字</button>
          <button class="filter-tag" onclick="filterByType('audio')">音频</button>
          <button class="filter-tag" onclick="filterByType('image')">图片</button>
          <button class="filter-tag" onclick="filterByType('link')">链接</button>
          <button class="filter-tag" onclick="filterByType('drawing')">涂鸦</button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Text Record Panel -->
      <div class="record-panel" id="text-panel">
        <div class="panel-header">
          <div class="panel-title">📝 文字记录</div>
          <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <input type="text" class="title-input" placeholder="标题(可选)" id="text-title">
        <textarea class="text-input" placeholder="在这里记录你的灵感..." id="text-content"></textarea>
        <input type="text" class="tag-input" placeholder="添加标签(用逗号分隔)" id="text-tags">
        <div class="action-buttons">
          <button class="save-btn" onclick="saveTextRecord()">保存灵感</button>
          <button class="cancel-btn" onclick="closePanel()">取消</button>
        </div>
      </div>

      <!-- Audio Record Panel -->
      <div class="record-panel" id="audio-panel">
        <div class="panel-header">
          <div class="panel-title">🎵 音频录制</div>
          <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <input type="text" class="title-input" placeholder="音频标题(可选)" id="audio-title">
        <div class="audio-controls">
          <button class="audio-btn" id="record-btn" onclick="toggleRecording()">🎙️ 开始录音</button>
          <button class="audio-btn" id="stop-btn" onclick="stopRecording()" style="display:none;">⏹️ 停止录音</button>
          <div id="audio-status" style="margin-top: 1rem; color: var(--muted);"></div>
          <audio id="audio-preview" controls style="width: 100%; margin-top: 1rem; display:none;"></audio>
        </div>
        <input type="text" class="tag-input" placeholder="添加标签(用逗号分隔)" id="audio-tags">
        <div class="action-buttons">
          <button class="save-btn" onclick="saveAudioRecord()">保存音频</button>
          <button class="cancel-btn" onclick="closePanel()">取消</button>
        </div>
      </div>

      <!-- Image Record Panel -->
      <div class="record-panel" id="image-panel">
        <div class="panel-header">
          <div class="panel-title">📷 图片捕捉</div>
          <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <input type="text" class="title-input" placeholder="图片标题(可选)" id="image-title">
        <div class="image-upload-area" onclick="document.getElementById('image-input').click()">
          <div style="font-size: 2rem; margin-bottom: 0.5rem;">📸</div>
          <div style="color: var(--muted);">点击上传图片或拖拽图片到此区域</div>
          <input type="file" accept="image/*" id="image-input" style="display:none;" onchange="previewImage(event)">
        </div>
        <img id="image-preview" class="image-preview">
        <input type="text" class="tag-input" placeholder="添加标签(用逗号分隔)" id="image-tags">
        <div class="action-buttons">
          <button class="save-btn" onclick="saveImageRecord()">保存图片</button>
          <button class="cancel-btn" onclick="closePanel()">取消</button>
        </div>
      </div>

      <!-- Link Record Panel -->
      <div class="record-panel" id="link-panel">
        <div class="panel-header">
          <div class="panel-title">🔗 链接收藏</div>
          <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <input type="text" class="title-input" placeholder="链接标题(可选)" id="link-title">
        <input type="url" class="link-input" placeholder="输入网页链接..." id="link-url">
        <input type="text" class="tag-input" placeholder="添加标签(用逗号分隔)" id="link-tags">
        <div class="action-buttons">
          <button class="save-btn" onclick="saveLinkRecord()">保存链接</button>
          <button class="cancel-btn" onclick="closePanel()">取消</button>
        </div>
      </div>

      <!-- Drawing Record Panel -->
      <div class="record-panel" id="drawing-panel">
        <div class="panel-header">
          <div class="panel-title">🎨 随手涂鸦</div>
          <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <input type="text" class="title-input" placeholder="涂鸦标题(可选)" id="drawing-title">
        <div class="drawing-tools">
          <input type="color" class="color-picker" id="brush-color" value="#3b82f6">
          <input type="range" class="brush-size" id="brush-size" min="1" max="20" value="3">
          <button class="clear-canvas-btn" onclick="clearCanvas()">清空画布</button>
        </div>
        <canvas class="drawing-canvas" id="drawing-canvas"></canvas>
        <input type="text" class="tag-input" placeholder="添加标签(用逗号分隔)" id="drawing-tags">
        <div class="action-buttons">
          <button class="save-btn" onclick="saveDrawingRecord()">保存涂鸦</button>
          <button class="cancel-btn" onclick="closePanel()">取消</button>
        </div>
      </div>

      <!-- Saved Items -->
      <div class="items-header">
        <h2 class="items-title">我的灵感库</h2>
      </div>
      <div class="items-grid" id="items-grid">
        <div class="empty-state">
          <div class="empty-icon">💡</div>
          <p>还没有保存任何灵感</p>
          <p style="font-size: 0.9rem;">点击左侧按钮开始记录</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    let savedItems = [];
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let currentFilter = 'all';
    let drawingCtx;

    // Initialize
    window.onload = function() {
      loadFromStorage();
      initDrawingCanvas();
    };

    // Show Record Panel
    function showRecordPanel(type) {
      closePanel();
      const panel = document.getElementById(`${type}-panel`);
      if (panel) {
        panel.classList.add('active');
      }
      // Highlight button
      document.querySelectorAll('.record-btn').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.record-btn').classList.add('active');
      
      // 初始化涂鸦画布（当面板显示后才初始化）
      if (type === 'drawing') {
        setTimeout(() => {
          initDrawingCanvas();
        }, 100);
      }
    }

    // Close Panel
    function closePanel() {
      document.querySelectorAll('.record-panel').forEach(panel => {
        panel.classList.remove('active');
      });
      document.querySelectorAll('.record-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      // Reset inputs
      document.querySelectorAll('input, textarea').forEach(input => {
        if (input.id !== 'search-input') input.value = '';
      });
      // Reset image preview
      document.getElementById('image-preview').style.display = 'none';
      // Clear canvas
      if (drawingCtx) clearCanvas();
    }

    // Save Text Record
    function saveTextRecord() {
      const title = document.getElementById('text-title').value || '无标题文字灵感';
      const content = document.getElementById('text-content').value;
      const tags = document.getElementById('text-tags').value;

      if (!content.trim()) {
        alert('请输入灵感内容');
        return;
      }

      const item = {
        type: 'text',
        title: title,
        content: content,
        tags: tags.split(',').filter(t => t.trim()),
        timestamp: new Date().toISOString(),
        id: Date.now()
      };

      savedItems.push(item);
      saveToStorage();
      updateDisplay();
      closePanel();
      alert('灵感已保存!');
    }

    // Audio Recording
    function toggleRecording() {
      if (!isRecording) {
        startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          const audioUrl = URL.createObjectURL(audioBlob);
          document.getElementById('audio-preview').src = audioUrl;
          document.getElementById('audio-preview').style.display = 'block';
          document.getElementById('audio-status').textContent = '录音完成!';
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById('record-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'inline-block';
        document.getElementById('audio-status').textContent = '正在录音...';
      } catch (err) {
        alert('无法访问麦克风: ' + err.message);
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('record-btn').style.display = 'inline-block';
        document.getElementById('stop-btn').style.display = 'none';
      }
    }

    function saveAudioRecord() {
      const title = document.getElementById('audio-title').value || '音频灵感';
      const tags = document.getElementById('audio-tags').value;
      const audioPreview = document.getElementById('audio-preview');

      if (!audioPreview.src) {
        alert('请先录制音频');
        return;
      }

      const item = {
        type: 'audio',
        title: title,
        audioUrl: audioPreview.src,
        tags: tags.split(',').filter(t => t.trim()),
        timestamp: new Date().toISOString(),
        id: Date.now()
      };

      savedItems.push(item);
      saveToStorage();
      updateDisplay();
      closePanel();
      alert('音频已保存!');
    }

    // Image Upload
    function previewImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('image-preview').src = e.target.result;
          document.getElementById('image-preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    function saveImageRecord() {
      const title = document.getElementById('image-title').value || '图片灵感';
      const tags = document.getElementById('image-tags').value;
      const imagePreview = document.getElementById('image-preview');

      if (!imagePreview.src) {
        alert('请先上传图片');
        return;
      }

      const item = {
        type: 'image',
        title: title,
        imageUrl: imagePreview.src,
        tags: tags.split(',').filter(t => t.trim()),
        timestamp: new Date().toISOString(),
        id: Date.now()
      };

      savedItems.push(item);
      saveToStorage();
      updateDisplay();
      closePanel();
      alert('图片已保存!');
    }

    // Link Record
    function saveLinkRecord() {
      const title = document.getElementById('link-title').value || '链接收藏';
      const url = document.getElementById('link-url').value;
      const tags = document.getElementById('link-tags').value;

      if (!url.trim()) {
        alert('请输入链接地址');
        return;
      }

      const item = {
        type: 'link',
        title: title,
        url: url,
        tags: tags.split(',').filter(t => t.trim()),
        timestamp: new Date().toISOString(),
        id: Date.now()
      };

      savedItems.push(item);
      saveToStorage();
      updateDisplay();
      closePanel();
      alert('链接已保存!');
    }

    // Drawing Canvas
    function initDrawingCanvas() {
      const canvas = document.getElementById('drawing-canvas');
      if (!canvas) return;
      
      // 确保画布尺寸正确
      canvas.width = canvas.offsetWidth || 600;
      canvas.height = canvas.offsetHeight || 300;
      
      drawingCtx = canvas.getContext('2d');
      drawingCtx.fillStyle = '#334155';
      drawingCtx.fillRect(0, 0, canvas.width, canvas.height);

      let isDrawing = false;
      let lastX = 0;
      let lastY = 0;

      // 鼠标事件
      canvas.addEventListener('mousedown', e => {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        lastX = e.clientX - rect.left;
        lastY = e.clientY - rect.top;
      });

      canvas.addEventListener('mousemove', e => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        drawingCtx.strokeStyle = document.getElementById('brush-color').value;
        drawingCtx.lineWidth = document.getElementById('brush-size').value;
        drawingCtx.lineCap = 'round';
        drawingCtx.beginPath();
        drawingCtx.moveTo(lastX, lastY);
        drawingCtx.lineTo(x, y);
        drawingCtx.stroke();
        lastX = x;
        lastY = y;
      });

      canvas.addEventListener('mouseup', () => isDrawing = false);
      canvas.addEventListener('mouseout', () => isDrawing = false);

      // 触屏事件（移动端支持）
      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        lastX = touch.clientX - rect.left;
        lastY = touch.clientY - rect.top;
      });

      canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        
        drawingCtx.strokeStyle = document.getElementById('brush-color').value;
        drawingCtx.lineWidth = document.getElementById('brush-size').value;
        drawingCtx.lineCap = 'round';
        drawingCtx.beginPath();
        drawingCtx.moveTo(lastX, lastY);
        drawingCtx.lineTo(x, y);
        drawingCtx.stroke();
        lastX = x;
        lastY = y;
      });

      canvas.addEventListener('touchend', () => isDrawing = false);
    }

    function clearCanvas() {
      const canvas = document.getElementById('drawing-canvas');
      if (canvas && drawingCtx) {
        drawingCtx.fillStyle = '#334155';
        drawingCtx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function saveDrawingRecord() {
      const title = document.getElementById('drawing-title').value || '涂鸦灵感';
      const tags = document.getElementById('drawing-tags').value;
      const canvas = document.getElementById('drawing-canvas');

      const item = {
        type: 'drawing',
        title: title,
        imageUrl: canvas.toDataURL(),
        tags: tags.split(',').filter(t => t.trim()),
        timestamp: new Date().toISOString(),
        id: Date.now()
      };

      savedItems.push(item);
      saveToStorage();
      updateDisplay();
      closePanel();
      alert('涂鸦已保存!');
    }

    // Delete Item
    function deleteItem(id) {
      if (confirm('确定要删除这个灵感吗?')) {
        savedItems = savedItems.filter(item => item.id !== id);
        saveToStorage();
        updateDisplay();
      }
    }

    // Filter Items
    function filterByType(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-tag').forEach(tag => {
        tag.classList.remove('active');
      });
      event.target.classList.add('active');
      updateDisplay();
    }

    function filterItems() {
      updateDisplay();
    }

    // Update Display
    function updateDisplay() {
      const grid = document.getElementById('items-grid');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();

      let filteredItems = savedItems;

      // Filter by type
      if (currentFilter !== 'all') {
        filteredItems = filteredItems.filter(item => item.type === currentFilter);
      }

      // Filter by search
      if (searchTerm) {
        filteredItems = filteredItems.filter(item =>
          item.title.toLowerCase().includes(searchTerm) ||
          item.content?.toLowerCase().includes(searchTerm) ||
          item.tags.some(tag => tag.toLowerCase().includes(searchTerm))
        );
      }

      if (filteredItems.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">💡</div>
            <p>没有找到灵感</p>
            <p style="font-size: 0.9rem;">尝试其他筛选条件或添加新灵感</p>
          </div>
        `;
      } else {
        grid.innerHTML = filteredItems.map(item => createItemCard(item)).join('');
      }

      // Update stats
      document.getElementById('total-items').textContent = savedItems.length;
    }

    function createItemCard(item) {
      const icons = {
        text: '📝',
        audio: '🎵',
        image: '📷',
        link: '🔗',
        drawing: '🎨'
      };

      const date = new Date(item.timestamp);
      const formattedDate = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()} ${date.getHours()}:${date.getMinutes()}`;

      let content = '';
      if (item.type === 'audio') {
        content = `<audio controls src="${item.audioUrl}" style="width: 100%; margin-top: 0.5rem;"></audio>`;
      } else if (item.type === 'image' || item.type === 'drawing') {
        content = `<img class="item-image" src="${item.imageUrl}">`;
      } else if (item.type === 'link') {
        content = `<a href="${item.url}" target="_blank" class="item-link">${item.url}</a>`;
      } else {
        content = `<div class="item-content">${item.content}</div>`;
      }

      return `
        <div class="item-card">
          <div class="item-type">${icons[item.type]}</div>
          <div class="item-title">${item.title}</div>
          ${content}
          <div class="item-meta">
            <span>${formattedDate}</span>
            ${item.tags.map(tag => `<span class="item-tag">${tag}</span>`).join('')}
            <button class="delete-btn" onclick="deleteItem(${item.id})">删除</button>
          </div>
        </div>
      `;
    }

    // Storage
    function saveToStorage() {
      localStorage.setItem('personalAssistantItems', JSON.stringify(savedItems));
    }

    function loadFromStorage() {
      const stored = localStorage.getItem('personalAssistantItems');
      if (stored) {
        savedItems = JSON.parse(stored);
        updateDisplay();
      }
    }
  </script>
</body>
</html>
